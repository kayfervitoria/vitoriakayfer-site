<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin • Vitória Kayfer</title>

  <!-- Netlify Identity (login) -->
  <script defer src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <!-- Decap CMS (alternativa ao unpkg - costuma falhar menos) -->
  <script defer src="https://cdn.jsdelivr.net/npm/decap-cms@3/dist/decap-cms.js"></script>

  <style>
    body { margin: 0; font-family: Arial, sans-serif; }
    .loading { padding: 16px; opacity: .7; }
  </style>
</head>
<body>
  <div class="loading">Carregando painel…</div>

  <script>
    // Evita “travamento” após login
    window.addEventListener("load", () => {
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    });
  </script>
</body>
</html>
