<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title id="seoTitle">Vitória Kayfer • Treinamento Queen Nails VIP</title>
<meta name="description" id="seoDesc" content="Treinamentos VIP presenciais em Indaiatuba/SP."/>
<meta property="og:title" content="Vitória Kayfer • Treinamento Queen Nails VIP"/>
<meta property="og:description" content="Treinamentos VIP presenciais em Indaiatuba/SP."/>
<meta property="og:type" content="website"/>
<meta property="og:image" id="seoOg" content="/imagens/vitoria-pro.png"/>
<meta name="theme-color" content="#caa247"/>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Great+Vibes&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter,system-ui;
background:linear-gradient(180deg,#fff3cc,#f1d483 40%,#fff);
}

.wrap{
max-width:1100px;
margin:auto;
padding:20px;
}

.heroimg{
width:100%;
max-height:420px;
object-fit:cover;
border-radius:20px;
}

.chip{
padding:10px 14px;
border-radius:999px;
text-decoration:none;
font-weight:700;
display:inline-block;
margin-right:8px;
}

.p{background:#000;color:#fff;}
.g{background:#caa247;color:#000;}

.kpi{
padding:14px;
background:#fff;
border-radius:14px;
margin-top:10px;
}

.gallery img{
width:100%;
height:220px;
object-fit:cover;
border-radius:14px;
margin-top:10px;
}

footer{
margin-top:40px;
font-size:13px;
opacity:.8;
}

</style>
</head>

<body>

<div class="wrap">

<h1 id="ht">Carregando...</h1>

<p id="hs"></p>

<img id="hi" class="heroimg" src="/imagens/vitoria-pro.png">

<div style="margin-top:20px">

<a id="waPrimary" class="chip p" target="_blank">WhatsApp</a>

<a href="#cursos" class="chip g">Ver cursos</a>

</div>

<h2>Cursos</h2>

<div id="cg"></div>

<h2>Portfólio</h2>

<div class="gallery" id="gg"></div>

<footer>

Para editar o site acesse:

<b>/admin</b>

</footer>

</div>

<script>

async function load(){

const r = await fetch("/content/site.json",{cache:"no-store"});

const d = await r.json();

document.getElementById("ht").textContent = d.hero.headline;

document.getElementById("hs").textContent = d.hero.subheadline;

if(d.hero.hero_image)
document.getElementById("hi").src = d.hero.hero_image;

const wa = d.brand.whatsapp;

const waUrl = (msg)=>`https://wa.me/${wa}?text=${encodeURIComponent(msg)}`;

document.getElementById("waPrimary").href =
waUrl("Oi Vitória! Quero informações sobre o curso.");

const cg = document.getElementById("cg");

cg.innerHTML="";

(d.courses||[]).forEach(c=>{

const div = document.createElement("div");

div.className="kpi";

div.innerHTML=`

<b>${c.title}</b>

<p>${c.desc}</p>

`;

cg.appendChild(div);

});

const gg = document.getElementById("gg");

gg.innerHTML="";

(d.portfolio?.images || []).forEach(src=>{

const img=document.createElement("img");

img.src=src;

gg.appendChild(img);

});

}

load();

</script>

<!-- NETLIFY IDENTITY -->
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

<script>

if (window.netlifyIdentity) {

window.netlifyIdentity.on("init", user => {

const params = new URLSearchParams(window.location.search);

if(params.get("invite_token")){

setTimeout(()=>{

window.location.href="/admin/";

},500);

}

});

}

</script>

</body>
</html>
